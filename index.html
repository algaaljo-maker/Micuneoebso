<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Mis 3 Añitos! - Renata Mailen</title>
    <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-frozen: #a1d6e2;
            --rosa-magico: #f1a7c4;
            --plata: #e2e2e2;
            --blanco-nieve: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, var(--azul-frozen), var(--rosa-magico));
            color: #333;
            text-align: center;
            overflow-x: hidden;
        }

        /* Efecto de Nieve */
        #snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .snowflake {
            position: absolute;
            top: -10px;
            color: white;
            font-size: 1em;
            user-select: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(105vh); }
        }

        /* Contenedor Principal */
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 4px solid var(--plata);
        }

        h1 {
            font-family: 'Mountains of Christmas', cursive;
            color: #2c5d8f;
            font-size: 3em;
            margin-bottom: 10px;
        }

        .fotos-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .fotos-grid img {
            width: 100%;
            border-radius: 15px;
            border: 3px solid var(--blanco-nieve);
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        .info-cumple {
            font-size: 1.2em;
            margin: 20px 0;
            line-height: 1.6;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
            background: #2c5d8f;
            color: white;
            padding: 15px;
            border-radius: 15px;
        }

        .time-box span {
            display: block;
            font-size: 1.5em;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            margin: 10px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-maps { background-color: var(--azul-frozen); color: #2c5d8f; }
        .btn-wsp { background-color: #25d366; color: white; font-size: 0.9em; opacity: 0.9; }

        audio {
            margin-top: 20px;
            width: 80%;
        }
    </style>
</head>
<body>

<div id="snow-container"></div>

<div class="container">
    <p style="font-size: 1.5em; color: #666;">❄️ ¡Libre soy para celebrar! ❄️</p>
    <h1>Renata Mailen</h1>
    <p style="font-size: 1.8em;">¡Cumple 3 Años!</p>

    <div class="fotos-grid">
        <img src="1000073062.jpg" alt="Renata 1">
        <img src="1000169632.jpg" alt="Renata 2">
    </div>

    <div class="info-cumple">
        <strong>📅 SÁBADO 9 DE MAYO</strong><br>
        <strong>⏰ 11:30 AM</strong><br>
        <p>Acompáñame en una aventura congelada llena de magia.</p>
        <a href="https://maps.app.goo.gl/6h1AAjG5iMCZv7p8A" class="btn btn-maps" target="_blank">📍 Ver Ubicación en Maps</a>
    </div>

    <div class="countdown" id="timer">
        <div class="time-box"><span id="days">0</span>Días</div>
        <div class="time-box"><span id="hours">0</span>Hrs</div>
        <div class="time-box"><span id="minutes">0</span>Min</div>
        <div class="time-box"><span id="seconds">0</span>Seg</div>
    </div>

    <a href="https://wa.me/529671511434?text=¡Hola!+Confirmo+mi+asistencia+al+cumpleaños+de+Renata" class="btn btn-wsp" target="_blank">
        Confirmar asistencia por WhatsApp
    </a>

    <div style="margin-top: 30px;">
        <p style="font-size: 0.8em; color: #777;">Escucha mi canción favorita:</p>
        <audio controls autoplay loop>
            <source src="musica.mp3" type="audio/mpeg">
            Tu navegador no soporta audio.
        </audio>
    </div>
</div>

<script>
    // Cuenta regresiva
    const eventDate = new Date('May 9, 2026 11:30:00').getTime();

    setInterval(() => {
        const now = new Date().getTime();
        const diff = eventDate - now;

        document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById('minutes').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        document.getElementById('seconds').innerText = Math.floor((diff % (1000 * 60)) / 1000);
    }, 1000);

    // Generador de nieve
    function createSnowflake() {
        const snow = document.createElement('div');
        snow.classList.add('snowflake');
        snow.innerHTML = '❄';
        snow.style.left = Math.random() * 100 + 'vw';
        snow.style.animationDuration = Math.random() * 3 + 2 + 's';
        snow.style.opacity = Math.random();
        document.getElementById('snow-container').appendChild(snow);
        
        setTimeout(() => snow.remove(), 5000);
    }
    setInterval(createSnowflake, 200);
</script>

</body>
</html>
